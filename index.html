<!DOCTYPE html>
<html>

<head>
    <title>Canteen Records</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

<div class="max-w-7xl mx-auto p-5">

    <div class="bg-white rounded-xl shadow border">

        <!-- Header -->
        <div class="p-6 border-b">

            <div class="flex justify-between items-center">

                <div>

                    <h1 class="text-2xl font-semibold">
                        Canteen Records
                    </h1>

                    <p class="text-gray-500 mt-1">
                        View, Edit and Delete Canteen Records
                    </p>

                </div>

            </div>

        </div>

        <!-- Search -->
       <div class="p-5 border-b">

    <div class="flex items-center gap-4">

        <div class="flex bg-gray-50 rounded-lg border flex-1">

            <!-- Filter Dropdown -->

            <div class="flex items-center bg-white border-r rounded-l-lg px-3 py-2 w-56">

                <svg
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-4 h-4 text-gray-500 mr-2"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor">

                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M3 4h18l-7 8v6l-4 2v-8L3 4z"/>

                </svg>

                <select
                    id="searchField"
                    class="w-full border-none outline-none bg-transparent text-sm font-medium">

                    <option value="organization">
                        Organization
                    </option>

                    <option value="subsidiary">
                        Subsidiary
                    </option>

                    <option value="location">
                        Location
                    </option>

                    <option value="meal">
                        Meal
                    </option>

                </select>

            </div>

            <!-- Search Input -->

            <div class="flex-1 flex items-center bg-white rounded-r-lg">

                <div class="relative flex-1">

                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor">

                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M21 21l-4.35-4.35M10.5 18a7.5 7.5 0 100-15 7.5 7.5 0 000 15z"/>

                    </svg>

                    <input
                        id="searchInput"
                        type="text"
                        placeholder="Search..."
                        class="w-full pl-10 pr-3 py-2 border-none outline-none bg-transparent">

                </div>

            </div>

        </div>

        <a
            href="add-record.html"
            class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-lg flex items-center gap-2">

            <span>+</span>

            <span>Add Record</span>

        </a>

    </div>

</div>

        <!-- Table -->
        <div class="overflow-x-auto">

<table class="w-full min-w-max border border-gray-200">

    <thead>

        <tr
        class="bg-slate-50 border-b">

            <th
            class="py-3 pl-4 text-left text-[11px] font-semibold uppercase tracking-wide text-slate-600">
                Organization
            </th>

            <th
            class="py-3 pl-4 text-left text-[11px] font-semibold uppercase tracking-wide text-slate-600">
                Subsidiary
            </th>

            <th
            class="py-3 pl-4 text-left text-[11px] font-semibold uppercase tracking-wide text-slate-600">
                Location
            </th>

            <th
            class="py-3 pl-4 text-left text-[11px] font-semibold uppercase tracking-wide text-slate-600">
                Meal
            </th>

            <th
            class="py-3  pl-6 text-left text-[11px] font-semibold uppercase tracking-wide text-slate-600 ">
                Actions
            </th>
        </tr>

    </thead>

    <tbody id="recordsTable"  class="py-3 pr-4 text-middle text-[11px] font-semibold uppercase tracking-wide text-slate-600 sticky right-0 bg-slate-50">

    </tbody>

</table>

</div>

<!-- Pagination Footer -->

<div
class="flex items-center justify-between px-4 py-3 border-t border-gray-200 bg-gray-50">

    <div
    id="paginationInfo"
    class="text-xs text-gray-600">

        Showing 1 to 5 of 0 entries

    </div>

    <div
    class="flex items-center gap-1.5">

        <button
        id="prevPage"
        class="h-8 w-8 rounded border bg-white hover:bg-gray-100 text-sm">

            ‹

        </button>

        <div
        id="pageNumbers"
        class="flex items-center gap-1">

        </div>

        <button
        id="nextPage"
        class="h-8 w-8 rounded border bg-white hover:bg-gray-100 text-sm">

            ›

        </button>

    </div>

</div>

</div>

</div>

<!-- View Modal -->

<div id="viewModal"
     class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">

    <div
        class="bg-white w-11/12 md:w-3/4 lg:w-2/3 rounded-lg p-6 relative max-h-[90vh] overflow-y-auto">

        <button
            id="closeModal"
            class="absolute top-3 right-4 text-3xl font-bold text-red-500 hover:text-red-700">
            &times;
        </button>

        <div id="modalContent"></div>

    </div>

</div>

<script src="records.js"></script>

</body>
</html>
